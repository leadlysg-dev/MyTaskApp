<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Spline+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F3F0EA; --card:#FCFAF6; --ink:#2B2722; --muted:#9A9187; --line:#E7E1D8;
    --header:#2B2722; --cream:#F3EFE7;
    --personal:#C2664D; --personal-soft:#F6E7E1;
    --leadly:#2F7E80;   --leadly-soft:#DEEEEE;
    --school:#C0902F;   --school-soft:#F5ECD8;
    --unsorted:#9A9187;
    --red:#C0564C; --amber:#C99A3A;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Spline Sans',system-ui,sans-serif; background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; padding:12px 12px 50px;
  }
  .wrap { width:100%; max-width:460px; margin:0 auto; }
  .eyebrow { font-size:10px; letter-spacing:.13em; text-transform:uppercase; font-weight:600; color:var(--muted); margin:0 2px 8px; }

  /* ---------- 1. HEADER ---------- */
  .band {
    background:var(--header);
    background-image:radial-gradient(120% 140% at 0% 0%, #3a352e 0%, #2b2722 55%);
    color:var(--cream); border-radius:18px; padding:16px 16px 14px; margin-bottom:16px;
  }
  .band-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .clock { font-family:'Spline Sans Mono',monospace; font-size:38px; font-weight:500; line-height:1; letter-spacing:-.02em; }
  .clock .ampm { font-size:.38em; color:#b8ad9c; margin-left:5px; }
  .date { margin-top:6px; color:#c3b9a8; font-size:13px; }
  .sync { margin-top:5px; font-size:11px; color:#8c8474; display:flex; align-items:center; gap:5px; }
  .sync .sd { width:6px; height:6px; border-radius:50%; background:#8c8474; }
  .sync.synced .sd{background:#6fae8e;} .sync.synced{color:#9bbfa9;}
  .sync.saving .sd{background:#cdb56a;} .sync.saving{color:#cdb56a;}
  .sync.offline .sd{background:#c08a6a;} .sync.offline{color:#c08a6a;}
  .weather { text-align:right; flex-shrink:0; }
  .weather .temp { font-family:'Spline Sans Mono',monospace; font-size:24px; font-weight:500; display:flex; align-items:center; gap:5px; justify-content:flex-end; }
  .weather .desc { color:#c3b9a8; font-size:12px; margin-top:1px; }
  .pinned { margin-top:13px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.09); border-radius:11px; padding:9px 12px; display:flex; align-items:center; gap:8px; }
  .pinned [contenteditable] { flex:1; outline:none; color:var(--cream); font-size:13px; min-height:17px; line-height:1.3; }
  .pinned [contenteditable]:empty::before { content:'Pin something important…'; color:#7d756a; }

  /* ---------- 2. CALENDAR ---------- */
  .cal { background:var(--card); border:1.5px solid var(--line); border-radius:16px; padding:12px 12px 10px; margin-bottom:16px; }
  .cal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .cal-head .m { font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:15px; }
  .cal-nav { display:flex; gap:4px; }
  .cal-nav button { background:none; border:1.5px solid var(--line); border-radius:8px; width:26px; height:26px; cursor:pointer; color:var(--ink); font-size:13px; line-height:1; }
  .cal-nav button:hover { border-color:var(--ink); }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
  .cal-dow { text-align:center; font-size:10px; color:var(--muted); font-weight:600; padding-bottom:4px; }
  .cal-cell { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:12px; border-radius:9px; cursor:pointer; position:relative; color:var(--ink); border:1.5px solid transparent; }
  .cal-cell.blank { cursor:default; }
  .cal-cell:not(.blank):hover { background:var(--bg); }
  .cal-cell.today { font-weight:700; }
  .cal-cell.today .num { background:var(--ink); color:var(--cream); border-radius:50%; width:21px; height:21px; display:grid; place-items:center; }
  .cal-cell.sel { border-color:var(--ink); }
  .cal-cell .num { line-height:21px; height:21px; display:grid; place-items:center; }
  .cal-dot { width:5px; height:5px; border-radius:50%; }
  .cal-dot.overdue{background:var(--red);} .cal-dot.today{background:var(--amber);} .cal-dot.later{background:var(--leadly);}

  /* ---------- 3. INPUT ---------- */
  .dump { display:flex; gap:7px; margin-bottom:8px; }
  .dump input { flex:1; font-family:inherit; font-size:15px; padding:13px 14px; border:1.5px solid var(--line); border-radius:13px; background:var(--card); color:var(--ink); }
  .dump input:focus { outline:none; border-color:var(--ink); }
  .dump input::placeholder { color:var(--muted); }
  .dump button { font-family:inherit; font-size:20px; font-weight:600; color:var(--cream); background:var(--ink); border:none; border-radius:13px; width:48px; cursor:pointer; transition:transform .12s; }
  .dump button:active { transform:scale(.95); }
  .autoline { font-size:11px; color:var(--muted); margin:0 2px 14px; display:flex; align-items:center; gap:6px; min-height:14px; }
  .autoline .spin { width:9px; height:9px; border:1.5px solid var(--line); border-top-color:var(--leadly); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ---------- 4. TABS + LIST ---------- */
  .tabs { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; padding-bottom:2px; -ms-overflow-style:none; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; font-family:inherit; font-size:12px; font-weight:500; border:1.5px solid var(--line); background:var(--card); color:var(--muted); border-radius:18px; padding:6px 12px; cursor:pointer; display:flex; align-items:center; gap:5px; }
  .tab .dot { width:7px; height:7px; border-radius:50%; }
  .tab.active { color:var(--ink); border-color:var(--ink); }
  .tab .n { color:var(--muted); font-size:11px; }

  .datebanner { display:none; align-items:center; justify-content:space-between; background:var(--leadly-soft); color:var(--leadly); border-radius:11px; padding:8px 12px; margin-bottom:12px; font-size:13px; font-weight:500; }
  .datebanner.show { display:flex; }
  .datebanner button { background:none; border:none; color:var(--leadly); cursor:pointer; font-size:16px; line-height:1; }

  .group-label { font-size:10px; letter-spacing:.12em; text-transform:uppercase; font-weight:600; color:var(--muted); margin:18px 2px 8px; }
  ul { list-style:none; }
  li { display:flex; align-items:flex-start; gap:10px; background:var(--card); border:1.5px solid var(--line); border-left-width:4px; border-radius:12px; padding:11px 11px; margin-bottom:7px; animation:pop .2s ease; }
  @keyframes pop { from{opacity:0;transform:translateY(-3px);} to{opacity:1;transform:none;} }
  li[data-cat="Personal"]{border-left-color:var(--personal);}
  li[data-cat="Leadly"]{border-left-color:var(--leadly);}
  li[data-cat="School"]{border-left-color:var(--school);}
  li[data-cat="Unsorted"]{border-left-color:var(--unsorted); border-left-style:dashed;}
  .check { flex-shrink:0; width:21px; height:21px; margin-top:1px; border-radius:50%; border:2px solid var(--line); cursor:pointer; display:grid; place-items:center; transition:all .15s; }
  .check:hover { border-color:var(--ink); }
  .check.done { background:var(--ink); border-color:var(--ink); }
  .check svg { width:12px; height:12px; opacity:0; transition:opacity .15s; }
  .check.done svg { opacity:1; }
  .body { flex:1; min-width:0; }
  .text { font-size:14.5px; line-height:1.34; word-break:break-word; }
  li.done-row .text { color:var(--muted); text-decoration:line-through; }
  .meta { display:flex; align-items:center; gap:7px; margin-top:7px; flex-wrap:wrap; }
  .chip { font-size:10.5px; font-weight:600; padding:3px 8px; border-radius:18px; cursor:pointer; user-select:none; border:none; font-family:inherit; }
  .chip[data-cat="Personal"]{background:var(--personal-soft);color:var(--personal);}
  .chip[data-cat="Leadly"]{background:var(--leadly-soft);color:var(--leadly);}
  .chip[data-cat="School"]{background:var(--school-soft);color:var(--school);}
  .chip[data-cat="Unsorted"]{background:#ECE7DE;color:var(--unsorted);}
  .chip.sorting { background:#ECE7DE; color:var(--muted); display:flex; align-items:center; gap:5px; }
  .chip.sorting .spin { width:8px; height:8px; border:1.5px solid #d6cfc4; border-top-color:var(--leadly); border-radius:50%; animation:spin .7s linear infinite; }
  .prio { font-size:10.5px; font-weight:500; display:flex; align-items:center; gap:3px; color:var(--muted); }
  .prio .pd { width:6px; height:6px; border-radius:50%; }
  .prio.high .pd{background:var(--red);} .prio.medium .pd{background:var(--amber);} .prio.low .pd{background:#9CA88F;}

  .due { position:relative; font-family:inherit; font-size:10.5px; font-weight:600; padding:3px 8px; border-radius:18px; cursor:pointer; border:1.5px solid var(--line); background:transparent; color:var(--muted); display:flex; align-items:center; gap:4px; }
  .due:hover { border-color:var(--ink); color:var(--ink); }
  .due.set.overdue { background:#F7E3E0; border-color:transparent; color:var(--red); }
  .due.set.today, .due.set.soon { background:var(--school-soft); border-color:transparent; color:var(--school); }
  .due.set.later { background:var(--bg); border-color:transparent; color:var(--ink); }
  .due .x { font-size:13px; line-height:1; opacity:.6; }
  .due input[type=date] { position:absolute; inset:0; opacity:0; width:100%; height:100%; cursor:pointer; }
  .del { flex-shrink:0; background:none; border:none; cursor:pointer; color:var(--muted); font-size:18px; line-height:1; padding:2px 5px; border-radius:7px; }
  .del:hover { color:var(--red); background:var(--bg); }
  .empty { text-align:center; color:var(--muted); padding:34px 16px; font-size:14px; line-height:1.6; border:1.5px dashed var(--line); border-radius:14px; }
  .empty .big { font-size:26px; display:block; margin-bottom:7px; }
  .loading { text-align:center; color:var(--muted); padding:40px 0; }
  .toast { position:fixed; bottom:14px; left:50%; transform:translateX(-50%) translateY(18px); background:var(--ink); color:var(--cream); padding:10px 16px; border-radius:11px; font-size:13px; opacity:0; pointer-events:none; transition:all .25s; z-index:50; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">

  <!-- 1. HEADER -->
  <div class="band">
    <div class="band-top">
      <div>
        <div class="clock" id="clock">--:--</div>
        <div class="date" id="date"></div>
        <div class="sync" id="sync"><span class="sd"></span><span id="syncTxt">Connecting…</span></div>
      </div>
      <div class="weather" id="weather"><div class="temp">…</div></div>
    </div>
    <div class="pinned"><span>📌</span><div id="pinned" contenteditable="true" spellcheck="false"></div></div>
  </div>

  <!-- 2. CALENDAR -->
  <div class="eyebrow">What's due</div>
  <div class="cal">
    <div class="cal-head">
      <div class="m" id="calMonth"></div>
      <div class="cal-nav"><button id="calPrev">‹</button><button id="calNext">›</button></div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- 3. INPUT -->
  <div class="eyebrow">Brain dump</div>
  <div class="dump">
    <input id="input" type="text" placeholder="Type anything…" autocomplete="off" />
    <button id="addBtn">+</button>
  </div>
  <div class="autoline" id="autoline"></div>

  <!-- 4. TABS + LIST -->
  <div class="tabs" id="tabs"></div>
  <div class="datebanner" id="datebanner"><span id="datebannerTxt"></span><button id="dateClear">×</button></div>
  <div id="app"><div class="loading">Loading…</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const API='/.netlify/functions';
const LS='todo-cache-v2';
const CATS=['Personal','Leadly','School'];
const FALLBACK_WEATHER={temp:19,emoji:'☀️',desc:'Sunny'};
let state={ pinned:'', tasks:[] };
let filter='All';
let selDate=null;                 // YYYY-MM-DD when a calendar day is selected
let isSorting=false;
const now0=new Date();
let calYear=now0.getFullYear(), calMonth=now0.getMonth();
const $=id=>document.getElementById(id);

/* ---- date helpers ---- */
function key(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
const TODAY_KEY=key(new Date());
function dueInfo(s){
  if(!s) return {state:'none',label:'Set due'};
  const [y,m,d]=s.split('-').map(Number);
  const due=new Date(y,m-1,d); due.setHours(0,0,0,0);
  const t=new Date(); t.setHours(0,0,0,0);
  const diff=Math.round((due-t)/86400000);
  let st = diff<0?'overdue':diff===0?'today':diff<=2?'soon':'later';
  let label = diff===0?'Today':diff===1?'Tomorrow':due.toLocaleDateString(undefined,{day:'numeric',month:'short'});
  if(diff<0) label=Math.abs(diff)+'d late';
  return {state:st,label};
}

/* ---- clock ---- */
function tick(){
  const d=new Date(); let h=d.getHours(); const m=String(d.getMinutes()).padStart(2,'0');
  const ampm=h>=12?'pm':'am'; let h12=h%12||12;
  $('clock').innerHTML=h12+':'+m+'<span class="ampm">'+ampm+'</span>';
  $('date').textContent=d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'long'});
}
tick(); setInterval(tick,1000);

/* ---- weather ---- */
function wEmoji(c){ if(c===0)return['☀️','Clear'];if(c<=2)return['🌤️','Part cloud'];if(c===3)return['☁️','Cloudy'];if(c<=48)return['🌫️','Fog'];if(c<=67)return['🌧️','Rain'];if(c<=77)return['🌨️','Snow'];if(c<=82)return['🌦️','Showers'];if(c<=99)return['⛈️','Storms'];return['🌡️','']; }
function paintW(t,e,d){ $('weather').innerHTML='<div class="temp">'+e+' '+Math.round(t)+'°</div><div class="desc">'+d+'</div>'; }
async function loadWeather(){
  paintW(FALLBACK_WEATHER.temp,FALLBACK_WEATHER.emoji,FALLBACK_WEATHER.desc);
  try{ const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=-27.47&longitude=153.03&current=temperature_2m,weather_code&timezone=auto');
    const j=await r.json(); const [e,d]=wEmoji(j.current.weather_code); paintW(j.current.temperature_2m,e,d);
  }catch(e){}
}

/* ---- sync indicator ---- */
function setSync(s){ const m={synced:['synced','Saved to Sheets'],saving:['saving','Saving…'],offline:['offline','Offline — saved locally'],idle:['','Connecting…']}; const [c,t]=m[s]||m.idle; $('sync').className='sync '+c; $('syncTxt').textContent=t; }

/* ---- storage (guarded) ---- */
function cacheLoad(){ try{ const s=localStorage.getItem(LS); if(s) state=JSON.parse(s); }catch(e){} }
function cacheSave(){ try{ localStorage.setItem(LS,JSON.stringify(state)); }catch(e){} }
async function remoteLoad(){
  try{ const r=await fetch(API+'/tasks'); if(!r.ok) throw 0; const d=await r.json();
    state={ pinned:d.pinned||'', tasks:(d.tasks||[]).map(t=>({...t, dueDate:t.dueDate||''})) };
    cacheSave(); $('pinned').textContent=state.pinned||''; paint(); setSync('synced');
  }catch(e){ setSync('offline'); }
}
let postTimer;
function save(){ cacheSave(); setSync('saving'); clearTimeout(postTimer); postTimer=setTimeout(remoteSave,700); }
async function remoteSave(){
  try{ const r=await fetch(API+'/tasks',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(state)}); if(!r.ok) throw 0; setSync('synced'); }
  catch(e){ setSync('offline'); }
}

/* ---- toast ---- */
let tT; function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2200); }

/* ---- actions ---- */
function add(){
  const v=$('input').value.trim(); if(!v) return;
  state.tasks.unshift({ id:Date.now()+Math.random(), text:v, category:'Unsorted', priority:'medium', done:false, dueDate:'', createdAt:new Date().toISOString() });
  $('input').value=''; save(); paint(); $('input').focus(); scheduleSort();
}
function toggleDone(id){ const t=find(id); if(t) t.done=!t.done; save(); paint(); }
function cycleCat(id){ const t=find(id); if(!t||t.category==='Unsorted') return; const o=['Personal','Leadly','School']; t.category=o[(o.indexOf(t.category)+1)%o.length]; save(); paint(); }
function setDue(id,val){ const t=find(id); if(t){ t.dueDate=val||''; } save(); paint(); }
function del(id){ state.tasks=state.tasks.filter(t=>t.id!==id); save(); paint(); }
function find(id){ return state.tasks.find(t=>t.id===id); }

/* ---- auto-sort ---- */
let sortTimer;
function scheduleSort(){ clearTimeout(sortTimer); sortTimer=setTimeout(runSort,1200); }
function localGuess(text){
  const s=text.toLowerCase();
  const has=(arr)=>arr.some(w=>s.includes(w));
  let category='Personal';
  if(has(['leadly','client','customer','sales','lead ','pitch','investor','product','feature','deploy','launch','market','campaign','hire','hiring','meeting','demo','mvp','churn','revenue','onboard','standup','roadmap'])) category='Leadly';
  else if(has(['assignment','exam','study','class','lecture','homework','quiz','essay','thesis','semester','tutorial','reading','professor','uni','course','revision','syllabus','lab ','grade'])) category='School';
  let priority='medium';
  if(has(['urgent','asap','today','eod','deadline','now','immediately'])) priority='high';
  else if(has(['someday','maybe','eventually','whenever'])) priority='low';
  return {category,priority};
}
async function runSort(){
  const pending=state.tasks.filter(t=>t.category==='Unsorted'&&!t.done);
  if(!pending.length){ isSorting=false; paintAuto(); return; }
  isSorting=true; paint();
  try{
    const r=await fetch(API+'/sort',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({items:pending.map(t=>t.text)})});
    if(!r.ok) throw 0;
    const d=await r.json(); const arr=d.results||[];
    pending.forEach((t,i)=>{ const g=arr[i]||localGuess(t.text); if(CATS.includes(g.category)) t.category=g.category; if(['high','medium','low'].includes(g.priority)) t.priority=g.priority; });
  }catch(e){
    pending.forEach(t=>{ const g=localGuess(t.text); t.category=g.category; t.priority=g.priority; });
  }
  isSorting=false; save(); paint();
}
function paintAuto(){
  const un=state.tasks.filter(t=>t.category==='Unsorted'&&!t.done).length;
  if(isSorting) $('autoline').innerHTML='<span class="spin"></span> Auto-sorting…';
  else if(un) $('autoline').textContent=un+' waiting to be sorted';
  else $('autoline').textContent='New items get sorted automatically.';
}

/* ---- calendar ---- */
function tasksByDate(){ const m={}; state.tasks.filter(t=>t.dueDate&&!t.done).forEach(t=>{ (m[t.dueDate]=m[t.dueDate]||[]).push(t); }); return m; }
function buildCal(){
  $('calMonth').textContent=new Date(calYear,calMonth,1).toLocaleDateString(undefined,{month:'long',year:'numeric'});
  const grid=$('calGrid'); grid.innerHTML='';
  ['S','M','T','W','T','F','S'].forEach(d=>{ const e=document.createElement('div'); e.className='cal-dow'; e.textContent=d; grid.appendChild(e); });
  const start=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const byDate=tasksByDate();
  for(let i=0;i<start;i++){ const e=document.createElement('div'); e.className='cal-cell blank'; grid.appendChild(e); }
  for(let d=1;d<=days;d++){
    const k=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const cell=document.createElement('div'); cell.className='cal-cell';
    if(k===TODAY_KEY) cell.classList.add('today');
    if(k===selDate) cell.classList.add('sel');
    const num=document.createElement('div'); num.className='num'; num.textContent=d; cell.appendChild(num);
    if(byDate[k]){
      const inf=byDate[k].map(t=>dueInfo(t.dueDate).state);
      const cls=inf.includes('overdue')?'overdue':inf.includes('today')?'today':'later';
      const dot=document.createElement('div'); dot.className='cal-dot '+cls; cell.appendChild(dot);
    }
    cell.onclick=()=>{ selDate=(selDate===k?null:k); buildCal(); paint(); };
    grid.appendChild(cell);
  }
}

/* ---- render list ---- */
const catColor={Personal:'var(--personal)',Leadly:'var(--leadly)',School:'var(--school)'};
function renderTabs(){
  const c={All:0,Personal:0,Leadly:0,School:0};
  state.tasks.filter(t=>!t.done).forEach(t=>{ c.All++; if(c[t.category]!==undefined) c[t.category]++; });
  const tabs=[['All',null],['Personal',catColor.Personal],['Leadly',catColor.Leadly],['School',catColor.School]];
  $('tabs').innerHTML=tabs.map(([n,col])=>'<button class="tab'+(filter===n&&!selDate?' active':'')+'" data-tab="'+n+'">'+(col?'<span class="dot" style="background:'+col+'"></span>':'')+n+' <span class="n">'+c[n]+'</span></button>').join('');
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{ filter=b.dataset.tab; selDate=null; buildCal(); paint(); });
}
function checkSVG(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'; }
function rowEl(t){
  const li=document.createElement('li'); li.dataset.cat=t.category; if(t.done) li.classList.add('done-row');
  const check=document.createElement('div'); check.className='check'+(t.done?' done':''); check.innerHTML=checkSVG(); check.onclick=()=>toggleDone(t.id);
  const body=document.createElement('div'); body.className='body';
  const text=document.createElement('div'); text.className='text'; text.textContent=t.text; body.appendChild(text);
  if(!t.done){
    const meta=document.createElement('div'); meta.className='meta';
    // category chip
    const chip=document.createElement('button');
    if(t.category==='Unsorted'&&isSorting){ chip.className='chip sorting'; chip.innerHTML='<span class="spin"></span>sorting'; }
    else { chip.className='chip'; chip.dataset.cat=t.category; chip.textContent=t.category; chip.title='Tap to change'; chip.onclick=()=>cycleCat(t.id); }
    meta.appendChild(chip);
    // priority
    if(t.category!=='Unsorted'){ const p=document.createElement('span'); p.className='prio '+t.priority; p.innerHTML='<span class="pd"></span>'+t.priority; meta.appendChild(p); }
    // due date control
    const inf=dueInfo(t.dueDate);
    const due=document.createElement('label'); due.className='due'+(t.dueDate?' set '+inf.state:'');
    due.innerHTML='📅 '+inf.label+(t.dueDate?' <span class="x" title="Clear">×</span>':'');
    const di=document.createElement('input'); di.type='date'; di.value=t.dueDate||'';
    di.onchange=e=>setDue(t.id,e.target.value);
    due.appendChild(di);
    if(t.dueDate){ due.querySelector('.x').onclick=(e)=>{ e.preventDefault(); e.stopPropagation(); setDue(t.id,''); }; }
    meta.appendChild(due);
    body.appendChild(meta);
  }
  const delBtn=document.createElement('button'); delBtn.className='del'; delBtn.innerHTML='×'; delBtn.title='Delete'; delBtn.onclick=()=>del(t.id);
  li.append(check,body,delBtn); return li;
}
const prioRank={high:0,medium:1,low:2};
function paint(){
  buildCal(); renderTabs(); paintAuto();
  // date banner
  const db=$('datebanner');
  if(selDate){ db.classList.add('show'); const [y,m,d]=selDate.split('-').map(Number); $('datebannerTxt').textContent='Due '+new Date(y,m-1,d).toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'}); }
  else db.classList.remove('show');

  const app=$('app'); app.innerHTML='';
  if(state.tasks.length===0){ app.innerHTML='<div class="empty"><span class="big">🗒️</span>Empty and calm.<br>Dump your first thing up top.</div>'; return; }

  let visible;
  if(selDate) visible=state.tasks.filter(t=>t.dueDate===selDate);
  else visible=state.tasks.filter(t=> filter==='All'||t.category===filter);

  let active=visible.filter(t=>!t.done).sort((a,b)=>{
    const ad=a.dueDate?dueInfo(a.dueDate):null, bd=b.dueDate?dueInfo(b.dueDate):null;
    const au=ad&&(ad.state==='overdue'||ad.state==='today')?0:1, bu=bd&&(bd.state==='overdue'||bd.state==='today')?0:1;
    if(au!==bu) return au-bu;
    return (prioRank[a.priority]??1)-(prioRank[b.priority]??1);
  });
  let done=visible.filter(t=>t.done);

  if(!active.length&&!done.length){ app.innerHTML='<div class="empty">Nothing here right now.</div>'; return; }
  if(active.length){ const ul=document.createElement('ul'); active.forEach(t=>ul.appendChild(rowEl(t))); app.appendChild(ul); }
  if(done.length){ const l=document.createElement('div'); l.className='group-label'; l.textContent='Done · '+done.length; app.appendChild(l); const ul=document.createElement('ul'); done.forEach(t=>ul.appendChild(rowEl(t))); app.appendChild(ul); }
}

/* ---- wire ---- */
$('addBtn').onclick=add;
$('input').addEventListener('keydown',e=>{ if(e.key==='Enter') add(); });
$('calPrev').onclick=()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} buildCal(); };
$('calNext').onclick=()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} buildCal(); };
$('dateClear').onclick=()=>{ selDate=null; buildCal(); paint(); };
$('pinned').addEventListener('input',()=>{ state.pinned=$('pinned').textContent.trim(); save(); });
$('pinned').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); $('pinned').blur(); } });

/* ---- boot ---- */
cacheLoad(); $('pinned').textContent=state.pinned||''; paint(); loadWeather(); setSync('idle'); remoteLoad();
</script>
